<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-Desert 300+ Arcade Hub</title>
    
    <link rel="icon" href="https://api.iconify.design/twemoji:video-game.svg" type="image/svg+xml">

    <style>
        :root {
            --bg-cyber: #0d0b09;
            --panel-cyber: #18130e;
            --border-cyber: #3d2c1d;
            --accent-gold: #f4a261;
            --accent-neon: #e76f51;
            --text-light: #f4f1de;
            --text-muted: #9a8c98;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-cyber);
            color: var(--text-light);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--accent-gold); margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 3px; font-size: 1.8rem; }
        p.subtitle { color: var(--text-muted); margin: 0; font-size: 0.9rem; }
        .container {
            width: 100%; max-width: 1000px;
            background: var(--panel-cyber); padding: 20px;
            border-radius: 12px; border: 2px solid var(--accent-neon);
            box-shadow: 0 0 25px rgba(231, 111, 81, 0.2);
        }
        .search-box {
            width: 100%; padding: 12px 15px; border-radius: 6px;
            background: #090705; border: 1px solid var(--border-cyber);
            color: var(--text-light); font-size: 1rem; margin-bottom: 15px; outline: none;
        }
        .search-box:focus { border-color: var(--accent-gold); }
        .game-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px; max-height: 350px; overflow-y: auto; padding-right: 5px; margin-bottom: 20px;
        }
        .game-grid::-webkit-scrollbar { width: 6px; }
        .game-grid::-webkit-scrollbar-thumb { background: var(--border-cyber); border-radius: 3px; }
        .game-card {
            background: #14100c; border: 1px solid var(--border-cyber);
            border-radius: 8px; padding: 12px; text-align: center; cursor: pointer;
            transition: all 0.2s ease; color: var(--text-light); font-weight: 600; font-size: 0.85rem;
            text-transform: capitalize;
        }
        .game-card:hover { border-color: var(--accent-gold); background: #231b14; transform: translateY(-3px); }
        #gameWrapper {
            width: 100%; position: relative; padding-bottom: 65%;
            background: #000; border-radius: 8px; overflow: hidden; border: 2px solid var(--border-cyber);
        }
        #gameContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .ad-banner-box {
            margin: 20px 0 10px 0; text-align: center; background: #14100c;
            padding: 10px; border-radius: 8px; border: 1px solid var(--border-cyber); min-height: 90px;
            display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>⚡ Cyber-Desert 300+ Arcade Hub</h1>
            <p class="subtitle">Cloud-Powered Retro & Modern HTML5 Games</p>
        </header>

        <input type="text" id="searchGame" class="search-box" placeholder="🔍 Scanning offline folder..." onkeyup="filterGames()" disabled>

        <div class="game-grid" id="gameGrid">
            <div style="grid-column: 1/-1; text-align: center; color: var(--accent-gold);">Loading games from offline directory...</div>
        </div>

        <div id="gameWrapper">
            <div id="gameContainer">
                <div style="color: var(--text-muted); text-align: center; font-size: 0.95rem;">Select a game from the list above to launch!</div>
            </div>
        </div>

        <div class="ad-banner-box" id="bannerAdBox">
            <div style="color: var(--text-muted); font-size: 0.8rem;">Loading banner ads...</div>
        </div>
    </div>

    <script>
        const NETLIFY_BASE_URL = "https://dainty-beignet-f49826.netlify.app/offline"; 
        let games = [];

        // Auto-detect game dari folder offline di Netlify
        async function fetchGameList() {
            try {
                const response = await fetch(NETLIFY_BASE_URL + '/');
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const links = doc.querySelectorAll('a');
                
                games = [];
                links.forEach(link => {
                    let href = link.getAttribute('href');
                    if (href && href.endsWith('/') && href !== '../' && href !== './') {
                        let folderName = href.replace(/\//g, '');
                        let displayName = folderName.replace(/[-_]/g, ' ');
                        games.push({ name: displayName, folder: folderName });
                    }
                });

                if (games.length > 0) {
                    renderGames(games);
                    document.getElementById('searchGame').disabled = false;
                    document.getElementById('searchGame').placeholder = `🔍 Search from ${games.length} offline games...`;
                } else {
                    document.getElementById('gameGrid').innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--accent-neon);">No games found in directory.</div>`;
                }
            } catch (error) {
                document.getElementById('gameGrid').innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--accent-neon);">Failed to load game list. Please check connection.</div>`;
            }
        }

        function renderGames(list) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            list.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerText = game.name;
                card.onclick = () => launchGame(`${NETLIFY_BASE_URL}/${game.folder}/index.html`);
                grid.appendChild(card);
            });
        }

        function launchGame(url) {
            const container = document.getElementById('gameContainer');
            container.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
        }

        function filterGames() {
            const keyword = document.getElementById('searchGame').value.toLowerCase();
            const filtered = games.filter(g => g.name.toLowerCase().includes(keyword));
            renderGames(filtered);
        }

        fetchGameList();

        window.addEventListener('load', () => {
            setTimeout(() => {
                const socialBarScript = document.createElement('script');
                socialBarScript.src = "https://examinerashtrayquizmaster.com/31/10/40/311040619fc9e23e3b07657ea04ab299.js";
                document.body.appendChild(socialBarScript);

                const popunderScript = document.createElement('script');
                popunderScript.src = "https://examinerashtrayquizmaster.com/32/56/aa/3256aae8d605fe5b082e3afda812dc9f.js";
                document.body.appendChild(popunderScript);

                const bannerContainer = document.getElementById('bannerAdBox');
                bannerContainer.innerHTML = `
                    <script async="async" data-cfasync="false" src="https://examinerashtrayquizmaster.com/11d12644b7837950f948d0a715595c44/invoke.js"><\/script>
                    <div id="container-11d12644b7837950f948d0a715595c44"></div>
                `;
                const nativeInvoke = document.createElement('script');
                nativeInvoke.src = "https://examinerashtrayquizmaster.com/11d12644b7837950f948d0a715595c44/invoke.js";
                bannerContainer.appendChild(nativeInvoke);

                console.log("The advertisement loads automatically after 1 minute.");
            }, 60000); 
        });
    </script>
</body>
</html>

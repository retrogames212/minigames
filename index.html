            --text-light: #f4f1de;

        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-cyber);
            color: var(--text-light);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--accent-gold); margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 3px; font-size: 1.8rem; }
        p.subtitle { color: var(--text-muted); margin: 0; font-size: 0.9rem; }
        .container {
            width: 100%; max-width: 1000px;
            background: var(--panel-cyber); padding: 20px;
            border-radius: 12px; border: 2px solid var(--accent-neon);
            box-shadow: 0 0 25px rgba(231, 111, 81, 0.2);
        }
        .search-box {
            width: 100%; padding: 12px 15px; border-radius: 6px;
            background: #090705; border: 1px solid var(--border-cyber);
            color: var(--text-light); font-size: 1rem; margin-bottom: 15px; outline: none;
        }
        .search-box:focus { border-color: var(--accent-gold); }
        .game-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px; max-height: 350px; overflow-y: auto; padding-right: 5px; margin-bottom: 20px;
        }
        .game-grid::-webkit-scrollbar { width: 6px; }
        .game-grid::-webkit-scrollbar-thumb { background: var(--border-cyber); border-radius: 3px; }
        .game-card {
            background: #14100c; border: 1px solid var(--border-cyber);
            border-radius: 8px; padding: 12px; text-align: center; cursor: pointer;
            transition: all 0.2s ease; color: var(--text-light); font-weight: 600; font-size: 0.85rem;
            text-transform: capitalize;
        }
        .game-card:hover { border-color: var(--accent-gold); background: #231b14; transform: translateY(-3px); }
        
        .game-header-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; font-size: 0.9rem; color: var(--accent-gold);
        }
        .fullscreen-btn {
            background: #231b14; border: 1px solid var(--accent-gold);
            color: var(--text-light); padding: 5px 12px; border-radius: 4px;
            cursor: pointer; font-size: 0.8rem; font-weight: 600;
            transition: background 0.2s; display: none;
        }
        .fullscreen-btn:hover { background: var(--accent-gold); color: #000; }

        #gameWrapper {
            width: 100%; position: relative; padding-bottom: 65%;
            background: #000; border-radius: 8px; overflow: hidden; border: 2px solid var(--border-cyber);
        }
        #gameWrapper:fullscreen {
            width: 100vw; height: 100vh; padding-bottom: 0; border: none; border-radius: 0;
        }
        #gameWrapper:-webkit-full-screen {
            width: 100vw; height: 100vh; padding-bottom: 0; border: none; border-radius: 0;
        }
        #gameWrapper:-moz-full-screen {
            width: 100vw; height: 100vh; padding-bottom: 0; border: none; border-radius: 0;
        }

        #gameContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .ad-banner-box {
            margin: 20px 0 10px 0; text-align: center; background: #14100c;
            padding: 10px; border-radius: 8px; border: 1px solid var(--border-cyber); min-height: 90px;
            display: flex; justify-content: center; align-items: center;
        }
    </style>

        function renderGames(list) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            list.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerText = game.name;
                card.onclick = () => launchGame(game.name, `${NETLIFY_BASE_URL}/${game.file}`);
                grid.appendChild(card);
            });
        }

        function launchGame(name, url) {
            const container = document.getElementById('gameContainer');
            container.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
            
            document.getElementById('nowPlayingText').innerText = `🎮 Now Playing: ${name}`;
            document.getElementById('fsBtn').style.display = 'inline-block';
        }

        function toggleFullscreen() {
            const wrapper = document.getElementById('gameWrapper');
            if (!document.fullscreenElement) {
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen();
                } else if (wrapper.webkitRequestFullscreen) {
                    wrapper.webkitRequestFullscreen();
                } else if (wrapper.mozRequestFullScreen) {
                    wrapper.mozRequestFullScreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                }
            }
        }

        function filterGames() {
            const keyword = document.getElementById('searchGame').value.toLowerCase();
            const filtered = games.filter(g => g.name.toLowerCase().includes(keyword));
            renderGames(filtered);
        }

        // Render initial games list
        renderGames(games);
